services:
  - type: web
    name: career-pulse
    env: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan migrate --force
    startCommand: |
      php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_HOST
        fromDb: career-pulse-db
      - key: DB_PORT
        fromDb: career-pulse-db
      - key: DB_DATABASE
        fromDb: career-pulse-db
      - key: DB_USERNAME
        fromDb: career-pulse-db
      - key: DB_PASSWORD
        fromDb: career-pulse-db