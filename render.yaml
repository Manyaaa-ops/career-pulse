services:
  - type: web
    name: career-pulse
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDb: career-pulse-db
      - key: DB_PORT
        fromDb: career-pulse-db
      - key: DB_DATABASE
        fromDb: career-pulse-db
      - key: DB_USERNAME
        fromDb: career-pulse-db
      - key: DB_PASSWORD
        fromDb: career-pulse-db